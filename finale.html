<div class="container">
    <div id="setup-screen">
        <h3>Willkommen an der Klassen-Börse</h3>
        <input type="text" id="playerName" placeholder="Dein Name / Teamname">
        <button onclick="startTrading()">Marktplatz beitreten</button>
    </div>

    <div id="trading-screen" style="display:none;">
        <div class="market-info">
            <div>Globaler Kurs: <strong id="price">Warten...</strong> €</div>
            <div>Dein Rang: <strong id="rank">#?</strong></div>
            <div>Depotwert: <strong id="total">1000.00</strong> €</div>
        </div>
        </div>
</div>

<script>
    async function startTrading() {
        const name = document.getElementById('playerName').value;
        if(!name) return alert("Bitte Namen eingeben!");
        
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('trading-screen').style.display = 'block';
        
        // Startet die Schleife, die den Preis vom Server abfragt
        syncWithGlobalMarket(name);
    }

    async function syncWithGlobalMarket(playerName) {
        setInterval(async () => {
            // 1. Hol den Preis, den der Lehrer-PC gerade gesetzt hat
            const { data } = await supabase.from('market').select('current_price').single();
            price = data.current_price;
            
            // 2. Führe die Strategie-Logik aus (wie oben programmiert)
            runLogic(); 

            // 3. Sende deinen neuen Kontostand an das Leaderboard
            let total = cash + (shares * price);
            await supabase.from('leaderboard').upsert({ name: playerName, score: total });
            
            updateUI();
        }, 1000);
    }
</script>
